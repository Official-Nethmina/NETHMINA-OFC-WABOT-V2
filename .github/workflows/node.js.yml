name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [25.x]

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    # 🛠️ FFmpeg ඉන්ස්ටෝල් කිරීම (Voice conversion එකට අනිවාර්යයි)
    - name: Install FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    # 📦 Packages install කිරීම
    - name: Install Dependencies
      run: |
        npm install
        npm install axios fluent-ffmpeg # මේවා package.json එකේ නැත්නම් මෙතනින් ඉන්ස්ටෝල් වෙනවා

    - name: Start the Bot
      run: npm run start

    # ටෙස්ට් කේස් නැත්නම් මේ පේළිය අයින් කරන්න පුළුවන්
    # - run: npm test
